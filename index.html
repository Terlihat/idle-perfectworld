<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Web Game - Pasar & Mailbox</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .panel { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 8px 12px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

    <h1>🎮 Web RPG Dashboard</h1>
    
    <div class="panel" id="player-panel">
        <h2>Info Pemain</h2>
        <p>Status: <span id="auth-status">Menghubungkan...</span></p>
        <p>UID: <span id="player-uid">-</span></p>
        <p>Gold Anda: <strong id="player-gold">0</strong></p>
    </div>

    <div class="panel" id="market-panel">
        <h2>Pasar Global</h2>
        <div id="market-list">Memuat barang...</div>
        <br>
        <button id="btn-buy-sample">Beli Pedang Api (Harga: 15000 Gold)</button>
    </div>

    <div class="panel" id="mailbox-panel">
        <h2>Kotak Masuk (Mailbox)</h2>
        <div id="mailbox-list">Memuat pesan...</div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/game.js"></script>

</body>
</html>
