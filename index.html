<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Web Game - Full Features</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #1e1e24; color: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #2a2a35; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { border-bottom: 2px solid #3f3f52; padding-bottom: 8px; margin-top: 0; color: #00d2ff; }
        button { padding: 10px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #0056b3; }
        button:disabled { background: #555; cursor: not-allowed; }
        /* Chat Box Style */
        #chat-box { height: 150px; overflow-y: auto; background: #111; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .chat-msg { margin-bottom: 5px; font-size: 14px; }
        .chat-name { color: #ffca28; font-weight: bold; }
        /* HP Bar Style */
        .hp-container { background: #555; width: 100%; height: 25px; border-radius: 5px; margin-bottom: 10px; position: relative; }
        #hp-bar { background: #dc3545; width: 100%; height: 100%; border-radius: 5px; transition: width 0.3s; }
        #hp-text { position: absolute; width: 100%; text-align: center; font-weight: bold; top: 2px; color: #fff; }
    </style>
</head>
<body>

    <h1>🎮 Giga RPG Dashboard (GitHub Pages Edition)</h1>
    
    <div class="panel" style="margin-bottom: 20px;">
        <h2>Status Karakter</h2>
        <p>UID: <span id="player-uid">Menghubungkan...</span> | Gold: <strong id="player-gold" style="color: #ffd700;">0</strong></p>
    </div>

    <div class="grid">
        <div>
            <div class="panel" style="margin-bottom: 20px;">
                <h2>👹 WORLD BOSS: <span id="boss-name">Memuat...</span></h2>
                <div class="hp-container">
                    <div id="hp-bar"></div>
                    <div id="hp-text">0 / 0 HP</div>
                </div>
                <button id="btn-attack">⚔️ SERANG BOSS!</button>
            </div>

            <div class="panel">
                <h2>⚖️ Pasar Global</h2>
                <div id="market-list">Memuat barang dagangan...</div>
                <br>
                <button id="btn-buy-sample">Beli Pedang Sampel (15,000 Gold)</button>
            </div>
        </div>

        <div>
            <div class="panel" style="margin-bottom: 20px;">
                <h2>💬 Chat Global Real-Time</h2>
                <div id="chat-box"></div>
                <input type="text" id="chat-input" placeholder="Tulis pesan..." style="width: 70%; padding: 8px; border-radius: 4px; border: none;">
                <button id="btn-send-chat" style="width: 25%;">Kirim</button>
            </div>

            <div class="panel">
                <h2>📬 Kotak Masuk</h2>
                <div id="mailbox-list">Memuat surat...</div>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/game.js"></script>
</body>
</html>
