<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfect World RPG Web</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">

        <div id="screen-auth" class="screen" style="display: block;">
            <div style="text-align:center; color:#aaa; margin-top: 20vh;">Memuat Gerbang Login...</div>
        </div>

        <div id="screen-char-select" class="screen" style="display: none;">
            <div style="text-align:center; color:#aaa; margin-top: 20vh;">Memuat Pemilihan Karakter...</div>
        </div>

        <div id="screen-game" class="screen" style="display: none;">

            <div id="component-navigation"></div>

            <div class="game-container">
                <div>
                    <div class="panel" id="panel-profile">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Profil...</div>
                    </div>
                    <div class="panel" id="panel-inventory">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Tas...</div>
                    </div>
                    <div class="panel" id="panel-crafting" style="display:none;">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Daftar Resep...</div>
                    </div>
                </div>

                <div>
                    <div class="panel" id="panel-world-boss" style="display:none; margin-bottom: 15px;"></div>
                    <div class="panel" id="panel-tower" style="display:none; margin-bottom: 15px;"></div>
                    <div class="panel" id="panel-afk" style="display:none; margin-bottom: 15px;"></div>
                    <div class="panel" id="panel-dungeon">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Solo Dungeon...</div>
                    </div>
                    <div class="panel" id="panel-party">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Fuben Party...</div>
                    </div>
                    <div class="panel" id="panel-quest">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Misi Quest...</div>
                    </div>
                    <div class="panel" id="panel-blacksmith" style="display:none;">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Pandai Besi...</div>
                    </div>

                    <div class="panel" id="panel-refine-transfer" style="display:none; margin-bottom: 15px;"></div>

                    <div class="panel" id="panel-pk" style="display:none; margin-bottom: 15px;"></div>

                    <div class="panel" id="panel-auction" style="display:none;">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Pasar Lelang...</div>
                    </div>
                </div>

                <div>
                    <div class="panel" id="panel-leaderboard" style="display:none; margin-bottom: 15px;"></div>
                    <div class="panel" id="panel-coin-market" style="display:none; margin-bottom: 15px;"></div>
                    <div class="panel panel-mall" id="panel-mall" style="display:none; margin-bottom: 15px;"></div>
                    <div class="panel" id="panel-shop" style="display:none; margin-bottom: 15px;"></div>
                    <div class="panel" id="panel-mailbox" style="display:none; margin-bottom: 15px;"></div>
                    <div id="panel-friends" class="panel" style="display: none;">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Teman...</div>
                    </div>
                    <div class="panel" id="panel-guild">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Guild...</div>
                    </div>
                    <div class="panel" id="panel-bank" style="display:none;">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Bankir...</div>
                    </div>
                    <div class="panel" id="panel-chat">
                        <div style="text-align:center; color:#aaa; font-size:12px;">Memuat Obrolan...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="component-modals"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/game.js"></script>
</body>

</html>
