<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <link rel="stylesheet" href="./css/admin.css">
</head>

<body>
    <div class="container" id="admin-content" style="display: none;">

        <div
            style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-bottom: 20px;">
            <h1 style="border: none; padding: 0; margin: 0;">⚙️ Admin Control Panel</h1>
            <button id="btn-home" style="background: #0366d6;">🏠 Kembali ke Game</button>
        </div>

        <h2>📊 Server Analytics</h2>
        <div class="grid-stats">
            <div class="stat-card">
                <h3>Total Pemain Terdaftar</h3>
                <div class="value" id="stat-total-players">0</div>
            </div>
            <div class="stat-card">
                <h3>Total Gold Beredar (Ekonomi)</h3>
                <div class="value" id="stat-total-gold" style="color: #ffd700;">0</div>
            </div>
            <div class="stat-card">
                <h3>Total COIN Beredar</h3>
                <div class="value" id="stat-total-coin" style="color: #00d2ff;">0</div>
            </div>
        </div>

        <div class="panel">
            <h2>📬 Kirim Surat & Hadiah (Mailbox System)</h2>
            <div id="mail-alert" class="alert"></div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>UID Pemain Penerima (Kosongkan untuk Broadcast ke Semua)</label>
                    <input type="text" id="mail-target-uid" placeholder="Contoh: aB3cD5eF...">
                </div>
                <div class="form-group">
                    <label>Judul Surat</label>
                    <input type="text" id="mail-title" placeholder="Kompensasi Maintenance">
                </div>
            </div>

            <div class="form-group">
                <label>Pesan Surat</label>
                <input type="text" id="mail-message" placeholder="Terima kasih telah bermain...">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Kirim Gold</label>
                    <input type="number" id="mail-gold" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Kirim COIN</label>
                    <input type="number" id="mail-coin" value="0" min="0">
                </div>
                <div class="form-group">
                    <label>Pilih Item Hadiah:</label>
                    <select id="mail-item-name"
                        style="width: 100%; padding: 8px; margin-bottom: 10px; background: #121216; color: #fff; border: 1px solid #3f3f52;">
                        <option value="">-- Sedang Memuat Data Item... --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Jumlah Item (Qty):</label>
                    <input type="number" id="mail-item-qty" placeholder="Contoh: 5" value="1"
                        style="width: 100%; padding: 8px; margin-bottom: 10px; background: #121216; color: #fff; border: 1px solid #3f3f52;">
                </div>
            </div>

            <button id="btn-send-mail">Kirim Surat Sekarang</button>
        </div>
    </div>

    <h2>🔍 Player Editor (Manajemen Pemain)</h2>
    <div class="panel">
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <input type="text" id="editor-search-uid" placeholder="Tempel FULL UID Pemain di sini..."
                style="flex: 1; padding: 10px; background: #121216; color: #fff; border: 1px solid #3f3f52; border-radius: 4px;">
            <button id="btn-search-player" style="background: #28a745; width: auto; padding: 0 20px;">Cari
                Pemain</button>
        </div>

        <div id="editor-results" style="display: none; border-top: 1px dashed #30363d; padding-top: 20px;">
            <h3 id="edit-player-name" style="color: #ffca28; margin-top: 0; font-size: 22px;">Nama Pemain</h3>
            <p style="font-size: 14px; color: #8b949e; margin-bottom: 15px;">
                Level: <strong id="edit-player-level" style="color: #fff;">1</strong> |
                Class: <strong id="edit-player-class" style="color: #00d2ff;">Warrior</strong>
            </p>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                <div class="form-group">
                    <label>Gold Pemain</label>
                    <input type="number" id="edit-player-gold" min="0">
                </div>
                <div class="form-group">
                    <label>Coin Pemain</label>
                    <input type="number" id="edit-player-coin" min="0">
                </div>
                <div class="form-group">
                    <label>Level Pemain</label>
                    <input type="number" id="edit-player-level-input" min="1">
                </div>
                <div class="form-group">
                    <label>EXP Pemain</label>
                    <input type="number" id="edit-player-exp" min="0">
                </div>
                <div class="form-group">
                    <label>VIP Level</label>
                    <input type="number" id="edit-player-vip" min="0">
                </div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button id="btn-save-player" style="background: #0366d6; flex: 1;">💾 Simpan Gold/Coin</button>
                <button id="btn-ban-player" style="background: #dc3545; flex: 1;">🚫 Banned Pemain</button>
            </div>
        </div>
    </div>

    </div>

    <div id="loading-screen" style="text-align: center; margin-top: 100px; color: #fff;">
        <h2>Memverifikasi Akses Admin...</h2>
    </div>

    <script type="module" src="./js/admin.js"></script>
</body>

</html>
