<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Alat Pemetaan Ikon PW</title>
    <link rel="icon" type="image/x-icon" href="../favicon.ico">
    <style>
        /* Reset Dasar */
        body {
            background-color: #121216;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            /* Mencegah scroll di seluruh layar */
        }

        /* ================= SIDEBAR PANEL (KIRI) ================= */
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            width: 320px;
            background: #1c1c24;
            border-right: 2px solid #3f3f52;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 18px;
            color: #00d2ff;
            text-align: center;
            border-bottom: 1px solid #3f3f52;
            padding-bottom: 10px;
        }

        /* Input Item */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }

        #item-name {
            width: 100%;
            padding: 10px;
            background: #121216;
            color: #fff;
            border: 1px solid #00d2ff;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        #item-name:focus {
            border-color: #ffcc00;
            box-shadow: 0 0 5px #ffcc00;
        }

        /* Preview (Kaca Pembesar) */
        .preview-box {
            text-align: center;
            margin-bottom: 15px;
        }

        #preview-container {
            width: 96px;
            height: 96px;
            /* Ukuran 32x32 di-zoom 3x */
            margin: 0 auto;
            border: 2px solid #ffcc00;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            background: #000;
        }

        #preview-img {
            position: absolute;
            top: 0;
            left: 0;
            transform-origin: top left;
            transform: scale(3);
            /* Zoom 3x */
            image-rendering: pixelated;
            pointer-events: none;
        }

        #coord-display {
            font-size: 11px;
            color: #aaa;
            margin-top: 5px;
            font-family: monospace;
        }

        /* Riwayat / Textarea */
        #history-box {
            flex-grow: 1;
            width: 100%;
            background: #0a0a0c;
            color: #28a745;
            border: 1px solid #3f3f52;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            resize: none;
            outline: none;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
            box-sizing: border-box;
        }

        /* ================= AREA KERJA (KANAN) ================= */
        .scroll-container {
            position: absolute;
            top: 0;
            left: 320px;
            right: 0;
            bottom: 0;
            overflow: auto;
            /* Memunculkan scrollbar di area ini saja */
            padding: 20px;
            background: #0a0a0c;
            box-sizing: border-box;
        }

        /* Bungkus Gambar dan Grid Sorot */
        #img-wrapper {
            position: relative;
            display: inline-block;
            background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px);
            background-size: 32px 32px;
            /* Ukuran asli grid */
        }

        #sprite-img {
            display: block;
            cursor: crosshair;
        }

        /* Kotak Kuning Sorotan (Snap to Grid) */
        #hover-box {
            position: absolute;
            border: 2px solid #ffcc00;
            background: rgba(255, 204, 0, 0.3);
            pointer-events: none;
            display: none;
            z-index: 10;
            box-sizing: border-box;
        }

        /* PANEL ZOOM (MENGAMBANG KANAN BAWAH) */
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            background: rgba(20, 20, 26, 0.4);
            /* Sangat transparan (40%) */
            backdrop-filter: blur(5px);
            /* Efek kaca blur kekinian */
            padding: 8px 12px;
            /* Jauh lebih kecil */
            border: 1px solid rgba(255, 204, 0, 0.3);
            /* Border setipis rambut dan transparan */
            border-radius: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
            transition: all 0.3s ease-in-out;
            /* Animasi transisi mulus */
        }

        /* Saat mouse diarahkan ke panel, warnanya kembali jelas agar mudah ditekan */
        .controls:hover {
            background: rgba(20, 20, 26, 0.95);
            border: 1px solid rgba(255, 204, 0, 1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.8);
        }

        button.zoom-btn {
            padding: 8px 15px;
            cursor: pointer;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }

        button.zoom-btn:hover {
            background: #0056b3;
        }

        .btn-reset {
            background: #dc3545 !important;
        }

        .btn-reset:hover {
            background: #c82333 !important;
        }

        /* Pesan Notifikasi Sukses */
        #toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            pointer-events: none;
            z-index: 10000;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>🛠️ Mesin Pembuat Items.JSON</h2>

        <div class="input-group">
            <label>1. Ketik Nama Item (Lalu klik gambar)</label>
            <input type="text" id="item-name" placeholder="Misal: Pedang Naga" autocomplete="off">
        </div>

        <div class="preview-box">
            <label style="font-size: 12px; color: #aaa;">2. Kaca Pembesar (Preview)</label>
            <div id="preview-container">
                <img src="../assets/interface.webp" id="preview-img">
            </div>
            <div id="coord-display">Kolom: - | Baris: -</div>
        </div>

        <label style="font-size: 12px; color: #aaa; margin-bottom: 5px;">3. Daftar Item Otomatis</label>
        <textarea id="history-box"></textarea>

        <!-- Tombol Aksi -->
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button onclick="copyAllJSON()"
                style="flex: 1; padding: 12px; background: #28a745; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;"
                onmouseover="this.style.background='#218838'" onmouseout="this.style.background='#28a745'">📋 SALIN
            </button>
            <button onclick="clearJSON()"
                style="flex: 1; padding: 12px; background: #dc3545; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;"
                onmouseover="this.style.background='#c82333'" onmouseout="this.style.background='#dc3545'">🗑️ HAPUS
            </button>
        </div>
    </div>

    <div class="scroll-container" id="scroll-area">
        <div id="img-wrapper">
            <img src="../assets/interface.webp" id="sprite-img" alt="Sprite Sheet">
            <div id="hover-box"></div>
        </div>
    </div>

    <div class="controls">
        <button class="zoom-btn" onclick="zoom(1.2)">➕ Zoom In</button>
        <button class="zoom-btn" onclick="zoom(0.8)">➖ Zoom Out</button>
        <button class="zoom-btn btn-reset" onclick="resetZoom()">🔄 Reset Zoom</button>
        <span id="zoom-level" style="margin-left: 10px; font-size: 14px; color:#fff; font-weight: bold;">Skala:
            1.0x</span>
    </div>

    <div id="toast">Disalin!</div>

    <script>
        const img = document.getElementById('sprite-img');
        const imgWrapper = document.getElementById('img-wrapper');
        const hoverBox = document.getElementById('hover-box');

        const previewImg = document.getElementById('preview-img');
        const coordDisplay = document.getElementById('coord-display');

        const inputName = document.getElementById('item-name');
        const historyBox = document.getElementById('history-box');
        const toast = document.getElementById('toast');
        const zoomLevelText = document.getElementById('zoom-level');

        let scale = 1;
        let baseWidth = 0;

        // Ambil dimensi asli gambar
        img.onload = () => { baseWidth = img.naturalWidth; };
        if (img.complete) { baseWidth = img.naturalWidth; }

        // --- SISTEM ZOOM ---
        function zoom(factor) {
            if (baseWidth === 0) baseWidth = img.naturalWidth;
            scale *= factor;
            applyZoom();
        }

        function resetZoom() {
            scale = 1;
            applyZoom();
        }

        function applyZoom() {
            img.style.width = (baseWidth * scale) + 'px';
            imgWrapper.style.width = (baseWidth * scale) + 'px';
            imgWrapper.style.backgroundSize = `${32 * scale}px ${32 * scale}px`;
            zoomLevelText.innerText = `Skala: ${scale.toFixed(1)}x`;
            hoverBox.style.display = 'none';
        }

        // --- SISTEM KACA PEMBESAR & SOROTAN ---
        imgWrapper.addEventListener('mousemove', function (e) {
            const rect = imgWrapper.getBoundingClientRect();
            const rawX = (e.clientX - rect.left) / scale;
            const rawY = (e.clientY - rect.top) / scale;

            const col = Math.floor(rawX / 32);
            const row = Math.floor(rawY / 32);

            if (col < 0 || row < 0) return;

            hoverBox.style.display = 'block';
            hoverBox.style.width = `${32 * scale}px`;
            hoverBox.style.height = `${32 * scale}px`;
            hoverBox.style.left = `${col * 32 * scale}px`;
            hoverBox.style.top = `${row * 32 * scale}px`;

            previewImg.style.left = `-${col * 32 * 3}px`;
            previewImg.style.top = `-${row * 32 * 3}px`;

            coordDisplay.innerText = `Kolom: ${col} | Baris: ${row}`;
        });

        imgWrapper.addEventListener('mouseleave', () => {
            hoverBox.style.display = 'none';
        });

        // --- SISTEM KLIK & GENERATE JSON (VERSI RATA KIRI) ---
        imgWrapper.addEventListener('click', function (e) {
            const rect = imgWrapper.getBoundingClientRect();
            const col = Math.floor(((e.clientX - rect.left) / scale) / 32);
            const row = Math.floor(((e.clientY - rect.top) / scale) / 32);

            let itemName = inputName.value.trim();
            if (!itemName) itemName = `Item_Baru_${col}_${row}`;

            const jsonLine = `"${itemName}": {"col": ${col}, "row": ${row}},\n`;

            historyBox.value += jsonLine;
            historyBox.scrollTop = historyBox.scrollHeight;

            inputName.value = '';
            inputName.focus();

            showToast(`✅ [${itemName}] ditambahkan!`);
        });

        // --- SALIN SEMUA KE CLIPBOARD ---
        function copyAllJSON() {
            if (historyBox.value.trim() === '') {
                showToast("⚠️ Daftar masih kosong!", "#dc3545");
                return;
            }
            // Tambahkan .trim() untuk memotong baris/spasi kosong berlebih di akhir
            navigator.clipboard.writeText(historyBox.value.trim());
            showToast("📋 Seluruh JSON berhasil disalin!");
        }

        // --- HAPUS DAFTAR JSON ---
        function clearJSON() {
            if (historyBox.value.trim() === '') return;
            historyBox.value = ''; // Mengosongkan textarea
            showToast("🗑️ Daftar JSON dibersihkan!", "#dc3545");
        }

        function showToast(msg, bgColor = "#28a745") {
            toast.innerText = msg;
            toast.style.background = bgColor;
            toast.style.opacity = 1;
            setTimeout(() => { toast.style.opacity = 0; }, 2000);
        }

        window.onload = () => { inputName.focus(); };

        // ==========================================
        // SISTEM NAVIGASI PINTAR (KEYBOARD & MOUSE)
        // ==========================================

        const scrollArea = document.getElementById('scroll-area');

        // 1. KONTROL KEYBOARD
        window.addEventListener('keydown', function (e) {
            const isTyping = (document.activeElement === inputName || document.activeElement === historyBox);
            const speed = 50;

            // FITUR BARU: Tekan 'Escape' (ESC) untuk melepas fokus dari kotak input
            if (e.key === 'Escape') {
                document.activeElement.blur();
                return;
            }

            // Jika sedang mengetik, jangan jalankan tombol W, A, S, D untuk scroll (biar bisa diketik)
            const key = e.key.toLowerCase();
            if (isTyping && ['w', 'a', 's', 'd'].includes(key)) return;

            // Navigasi
            if (e.key === 'ArrowUp' || key === 'w') {
                scrollArea.scrollBy({ top: -speed, left: 0 }); e.preventDefault();
            }
            else if (e.key === 'ArrowDown' || key === 's') {
                scrollArea.scrollBy({ top: speed, left: 0 }); e.preventDefault();
            }
            else if (e.key === 'ArrowLeft' || key === 'a') {
                // Biarkan panah kiri berfungsi untuk menggeser kursor teks jika sedang mengetik
                if (isTyping && e.key === 'ArrowLeft') return;
                scrollArea.scrollBy({ top: 0, left: -speed }); e.preventDefault();
            }
            else if (e.key === 'ArrowRight' || key === 'd') {
                if (isTyping && e.key === 'ArrowRight') return;
                scrollArea.scrollBy({ top: 0, left: speed }); e.preventDefault();
            }
        });

        // 2. KONTROL KLIK KANAN & GESER (MOUSE DRAG)
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        scrollArea.addEventListener('mousedown', (e) => {
            if (e.button !== 2) return; // Hanya aktif jika yang ditekan adalah KLIK KANAN (button 2)
            isDragging = true;
            scrollArea.style.cursor = 'grabbing';
            startX = e.pageX - scrollArea.offsetLeft;
            startY = e.pageY - scrollArea.offsetTop;
            scrollLeft = scrollArea.scrollLeft;
            scrollTop = scrollArea.scrollTop;
        });

        scrollArea.addEventListener('mouseleave', () => { isDragging = false; scrollArea.style.cursor = 'default'; });
        scrollArea.addEventListener('mouseup', () => { isDragging = false; scrollArea.style.cursor = 'default'; });

        scrollArea.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - scrollArea.offsetLeft;
            const y = e.pageY - scrollArea.offsetTop;
            const walkX = (x - startX) * 1.5; // Kecepatan geser mouse (1.5x)
            const walkY = (y - startY) * 1.5;
            scrollArea.scrollLeft = scrollLeft - walkX;
            scrollArea.scrollTop = scrollTop - walkY;
        });

        // Matikan menu konteks default saat klik kanan di area gambar agar tidak mengganggu
        scrollArea.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>

</html>
