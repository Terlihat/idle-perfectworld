<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Alat Pemetaan Ikon RPG (Zoomable)</title>
    <style>
        body { background-color: #121216; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; overflow-x: hidden; }
        
        /* Kontrol UI */
        .controls { position: fixed; top: 10px; left: 10px; z-index: 200; display: flex; gap: 5px; }
        button { padding: 10px 15px; cursor: pointer; background: #333; color: #fff; border: 1px solid #555; border-radius: 4px; }
        button:hover { background: #555; }
        
        #result-box { 
            position: fixed; top: 10px; right: 10px; z-index: 200;
            background: #28a745; padding: 10px 20px; border-radius: 8px; 
            font-weight: bold; border: 2px solid #fff;
        }

        /* Area Gambar */
        .wrapper { margin-top: 60px; display: inline-block; border: 2px solid #00d2ff; }
        #sprite-img { 
            display: block; cursor: crosshair;
            /* Efek grid kotak-kotak */
            background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px);
            background-size: 32px 32px;
            transition: transform 0.1s ease-out;
            transform-origin: top left;
        }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="zoom(1.2)">🔍 Zoom In</button>
        <button onclick="zoom(0.8)">🔎 Zoom Out</button>
        <button onclick="resetZoom()">🔄 Ukuran Asli</button>
    </div>
    
    <div id="result-box">Klik ikon mana saja!</div>

    <div class="wrapper">
        <img src="./assets/interface.webp" id="sprite-img" alt="Sprite Sheet">
    </div>

    <script>
        const img = document.getElementById('sprite-img');
        const resultBox = document.getElementById('result-box');
        let scale = 1;

        function zoom(factor) {
            scale *= factor;
            img.style.transform = `scale(${scale})`;
        }

        function resetZoom() {
            scale = 1;
            img.style.transform = `scale(1)`;
        }

        img.addEventListener('click', function(e) {
            // Menghitung posisi klik dengan mempertimbangkan skala zoom
            const rect = img.getBoundingClientRect();
            const x = (e.clientX - rect.left) / scale;
            const y = (e.clientY - rect.top) / scale;

            const col = Math.floor(x / 32);
            const row = Math.floor(y / 32);

            const codeToCopy = `{ col: ${col}, row: ${row} }`;

            resultBox.innerText = `✅ Tersalin: ${codeToCopy}`;
            navigator.clipboard.writeText(codeToCopy);
        });
    </script>
</body>
</html>
