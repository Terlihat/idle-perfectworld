<div class="panel auth-box"
    style="max-width: 320px; margin: 10vh auto; padding: 30px 20px; background: #16222f; border: 1px solid #00d2ff; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);">
    <h2 id="auth-title" style="text-align: center; color: #ffca28; margin-bottom: 20px; font-size: 22px;">PERFECT WORLD
    </h2>

    <input type="email" id="auth-email" placeholder="Alamat Email"
        style="width: 100%; padding: 12px; margin-bottom: 12px; background: #0d151e; color: #fff; border: 1px solid #3f3f52; border-radius: 4px; box-sizing: border-box;">

    <input type="password" id="auth-password" placeholder="Kata Sandi"
        style="width: 100%; padding: 12px; margin-bottom: 20px; background: #0d151e; color: #fff; border: 1px solid #3f3f52; border-radius: 4px; box-sizing: border-box;">

    <button id="btn-primary-auth"
        style="width: 100%; padding: 12px; background: #28a745; color: #fff; font-weight: bold; font-size: 16px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s;">MASUK</button>

    <p style="text-align: center; font-size: 13px; margin-top: 20px; color: #aaa;">
        <span id="auth-toggle-text">Belum punya akun?</span>
        <br><br>
        <a href="#" id="link-toggle-auth"
            style="color: #00d2ff; text-decoration: none; font-weight: bold; font-size: 14px;">Daftar Sekarang</a>
    </p>
</div>
