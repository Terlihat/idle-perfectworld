<div class="panel" style="max-width: 450px; margin: 10vh auto; padding: 30px; background: #16222f; border: 1px solid #ff9800; border-radius: 8px; text-align: center; box-shadow: 0 0 15px rgba(255, 152, 0, 0.2);">
    <h2 style="color: #ffca28; margin-bottom: 10px; font-size: 24px;">⚔️ Takdir Pahlawan</h2>
    <p style="font-size: 13px; color: #aaa; margin-bottom: 25px;">Pilih jalan takdirmu di dunia ini!</p>
    
    <input type="text" id="char-name-input" placeholder="Masukkan Nama Karakter" style="width: 80%; padding: 12px; margin-bottom: 25px; background: #0d151e; color: #fff; border: 1px solid #3f3f52; border-radius: 4px; text-align: center; font-weight: bold; font-size: 16px;">
    
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
        <label style="cursor: pointer; background: #1c152a; padding: 15px; border: 2px solid #dc3545; border-radius: 8px; width: 40%; transition: 0.3s;">
            <input type="radio" name="char-class" value="Warrior" checked style="display: none;">
            <div style="font-size: 35px; margin-bottom: 5px;">🛡️</div>
            <strong style="color: #ff4a4a; font-size: 16px;">Warrior</strong>
            <div style="font-size: 11px; color: #aaa; margin-top: 5px;">HP & P.ATK Tinggi</div>
        </label>
        
        <label style="cursor: pointer; background: #15201b; padding: 15px; border: 2px solid #00d2ff; border-radius: 8px; width: 40%; transition: 0.3s;">
            <input type="radio" name="char-class" value="Mage" style="display: none;">
            <div style="font-size: 35px; margin-bottom: 5px;">🔮</div>
            <strong style="color: #4ae3ff; font-size: 16px;">Mage</strong>
            <div style="font-size: 11px; color: #aaa; margin-top: 5px;">MP & M.ATK Tinggi</div>
        </label>
    </div>
    
    <button id="btn-create-char" style="width: 80%; padding: 14px; background: #ff9800; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; text-transform: uppercase;">🔥 Mulai Petualangan 🔥</button>
</div>
