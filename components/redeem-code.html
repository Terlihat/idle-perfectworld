<!-- Isi dari components/redeem-code.html -->
<div class="panel"
    style="background: #1c1c24; padding: 15px; border: 1px solid #ffca28; border-radius: 6px; margin: 15px 0; text-align: center;">
    <h3 style="color: #ffca28; margin-top: 0; margin-bottom: 10px;">🎁 Kode Redeem</h3>
    <p style="color: #aaa; font-size: 12px; margin-bottom: 10px;">Punya Gift Code dari Admin? Tukarkan di sini!</p>

    <div style="display: flex; gap: 10px; justify-content: center;">
        <input type="text" id="input-redeem-code" placeholder="Masukkan Kode..."
            style="padding: 10px; border-radius: 4px; border: 1px solid #3f3f52; background: #121216; color: #fff; text-transform: uppercase; font-weight: bold; width: 60%;">
        <button onclick="window.claimGiftCode()"
            style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;">TUKARKAN</button>
    </div>
</div>
