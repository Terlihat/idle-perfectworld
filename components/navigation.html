<div class="game-header">
    <h1 style="margin: 0; font-size: 20px;"> Perfect World</h1>
    <div style="display: flex; gap: 15px; font-weight: bold; font-size: 14px; align-items: center;">
        <span>🪙 <span id="header-coin" style="color: #ffcc00;">0</span> COIN</span>
        <span>💰 <span id="header-gold" style="color: #ffd700;">0</span> Gold</span>
        <button id="btn-admin-panel" style="display: none; background: #28a745;">⚙️ Panel Admin</button>
        <button id="btn-logout" style="background: #dc3545;">Keluar</button>
    </div>
</div>

<div
    style="display: flex; flex-wrap: wrap; gap: 10px; margin: 15px 0; justify-content: center; background: #1a1a1a; padding: 10px; border-radius: 5px; border: 1px solid #333;">
    <button id="btn-toggle-mall" style="background: #ffcc00; color: #000; font-weight: bold; padding: 8px 15px;">💎 Item
        Mall</button>
    <button id="btn-toggle-shop" style="background: #17a2b8; color: #fff; font-weight: bold; padding: 8px 15px;">🏪
        Toko</button>
    <button id="btn-toggle-coin-market"
        style="background: #28a745; color: #fff; font-weight: bold; padding: 8px 15px;">💱 Pasar Coin</button>
    <button id="btn-toggle-mail"
        style="position: relative; background: #dc3545; color: #fff; font-weight: bold; padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer;">
        📬 Kotak Surat
        <span id="mail-badge"
            style="display: none; position: absolute; top: -8px; right: -8px; background: #ff4c4c; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; border: 2px solid #1a1a1a; font-weight: bold; box-shadow: 0 0 5px red;">0</span>
    </button>
    <button id="btn-toggle-friends"
        style="background: #0366d6; color: #fff; font-weight: bold; padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer;">👥
        Teman</button>
    <button id="btn-toggle-leaderboard"
        style="background: #e83e8c; color: #fff; font-weight: bold; padding: 8px 15px;">🏆 Peringkat</button>
    <button id="btn-toggle-pk" style="background: #8b0000; color: #fff; font-weight: bold; padding: 8px 15px;">⚔️ Dark
        Forest</button>
    <button id="btn-toggle-boss" style="background: #6f42c1; color: #fff; font-weight: bold; padding: 8px 15px;">👹
        WB</button>
    <button onclick="window.togglePanel('panel-tower')"
        style="background: #f5980c; color: #fff; font-weight: bold; padding: 8px 15px;">🗼
        Tower</button>
    <button onclick="window.togglePanel('panel-afk')"
        style="background: #005f73; color: #fff; font-weight: bold; padding: 8px 15px;">⛺
        AFK</button>
    <button id="btn-toggle-reincarnation" onclick="window.togglePanel('panel-reincarnation')"
        style="display: none; background: #ff5722; color: #fff; font-weight: bold; padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer;">
        🔄 Rebirth
    </button>
    <button onclick="window.togglePanel('panel-redeem-code')"
        style="background: #d35400; color: #fff; font-weight: bold; padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer;">🎁
        Redeem</button>
    <button id="btn-toggle-tickets"
        style="background: #e67e22; color: #fff; font-weight: bold; padding: 8px 15px; border: none; border-radius: 3px; cursor: pointer;">🎫
        Bantuan</button>
</div>
