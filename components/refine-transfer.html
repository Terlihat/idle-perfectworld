<h2 style="text-align: center; color: #00d2ff; margin-top: 0;">🔮 Altar Pewarisan (Refine Transfer)</h2>
<p style="text-align:center; color:#aaa; font-size:12px;">Pindahkan tingkat tempa (+X) dari perlengkapan lama ke perlengkapan baru. Membutuhkan Universal Stone.</p>

<div style="display: flex; justify-content: space-around; align-items: center; margin: 20px 0; background: #121216; padding: 20px; border: 1px solid #333; border-radius: 8px;">
    
    <!-- SLOT KIRI: SUMBER TEMPA -->
    <div style="text-align: center;">
        <div style="color: #ffcc00; font-weight: bold; margin-bottom: 5px; font-size: 12px;">Item Tumbal (Sumber)</div>
        <div id="transfer-slot-source" onclick="window.openTransferSelect('source')" style="width: 60px; height: 60px; border: 2px dashed #555; border-radius: 5px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto; transition: 0.2s;">
            <span style="font-size: 24px; color: #555;">+</span>
        </div>
        <div id="transfer-name-source" style="font-size: 11px; color: #fff; margin-top: 5px; height: 15px;">Pilih Item</div>
    </div>

    <!-- PANAH TENGAH -->
    <div style="font-size: 24px; color: #00d2ff;">➡️</div>

    <!-- SLOT KANAN: TARGET PENERIMA -->
    <div style="text-align: center;">
        <div style="color: #28a745; font-weight: bold; margin-bottom: 5px; font-size: 12px;">Item Baru (Target)</div>
        <div id="transfer-slot-target" onclick="window.openTransferSelect('target')" style="width: 60px; height: 60px; border: 2px dashed #555; border-radius: 5px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: pointer; margin: 0 auto; transition: 0.2s;">
            <span style="font-size: 24px; color: #555;">+</span>
        </div>
        <div id="transfer-name-target" style="font-size: 11px; color: #fff; margin-top: 5px; height: 15px;">Pilih Item</div>
    </div>

</div>

<!-- BIAYA TRANSFER -->
<div style="text-align: center; background: #1a1a1a; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
    <div style="font-size: 12px; color: #aaa;">Biaya Transfer:</div>
    <div style="font-size: 16px; font-weight: bold; color: #e83e8c;">
        💎 <span id="transfer-cost-amount">0</span> Universal Stone
    </div>
    <div style="font-size: 11px; color: #aaa; margin-top: 5px;">(Milik Anda: <span id="transfer-owned-stone">0</span>)</div>
</div>

<button onclick="window.executeTransfer()" style="width: 100%; background: #00d2ff; color: #000; font-weight: bold; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px;">EKSEKUSI PEWARISAN</button>

<!-- MODAL PEMILIHAN ITEM TERSEMBUNYI -->
<div id="transfer-select-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#121216; border:1px solid #00d2ff; border-radius:8px; padding:20px; width:300px; max-height: 80vh; display:flex; flex-direction:column;">
        <h3 id="transfer-modal-title" style="color:#00d2ff; margin-top:0; text-align:center;">Pilih Item</h3>
        <div id="transfer-item-list" style="overflow-y:auto; flex:1; margin-bottom:15px; display:flex; flex-direction:column; gap:5px;"></div>
        <button onclick="document.getElementById('transfer-select-modal').style.display='none'" style="background:#dc3545; color:#fff; padding:10px; border:none; border-radius:3px; cursor:pointer; font-weight:bold;">BATAL</button>
    </div>
</div>
