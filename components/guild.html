<h2 style="color: #ffcc00;">🛡️ Guild</h2>
<div id="guild-unjoined-view" style="display:none;">
    <div style="display:flex; gap:5px; margin-bottom:5px;">
        <input type="text" id="input-guild-name" placeholder="Ketik Nama Klan Baru" style="flex:1;">
        <button id="btn-create-guild" style="background:#28a745;">Buat (100k G)</button>
    </div>
    <hr style="border-color:#333; margin:8px 0;">
    <strong style="font-size:11px; color:#ffcc00;">Daftar Klan Terbuka:</strong>
    <div id="guild-available-list" style="max-height: 120px; overflow-y: auto; font-size:11px; background:#121216; padding:5px; border:1px solid #333; margin-top:5px;"></div>
</div>

<div id="guild-joined-view" style="display:none;">
    <h3 id="guild-name-display" style="margin:0; color:#00d2ff;">...</h3>
    <div style="font-size:11px; color:#aaa; margin-bottom:5px;">
        Level <strong id="guild-level-display" style="color:#ffcc00;">1</strong> | Ketua: <span id="guild-leader-display">...</span>
    </div>
    <div style="font-size:11px; margin-bottom:5px; padding:4px; background:#28a745; color:#fff; border-radius:3px;">
        🌟 Buff Guild Aktif: <strong id="guild-buff-display">...</strong>
    </div>
    <div style="display:flex; align-items:center; gap:5px; margin-bottom:5px;">
        <div style="font-size:11px; flex:1;">Dana Guild: <strong id="guild-vault-display" style="color:#ffd700;">0</strong> G</div>
        <input type="number" id="input-donate-gold" placeholder="Sumbang" style="width:60px; font-size:10px;">
        <button id="btn-donate-guild" style="padding:4px 8px; background:#ffca28; color:#000; font-size:10px; font-weight:bold;">Donasi</button>
    </div>

    <div id="guild-management-controls" style="display:none; gap:5px; margin-bottom:5px;">
        <button id="btn-upgrade-guild" style="flex:1; background:#007bff; font-size:10px;">⏫ Naik Level</button>
        <button id="btn-edit-motd" style="flex:1; background:#6f42c1; font-size:10px;">📝 Edit Pengumuman</button>
        <button id="btn-disband-guild" style="flex:1; background:#dc3545; font-size:10px;">❌ Bubarkan</button>
    </div>
    
    <div style="background:#121216; padding:5px; font-size:11px; margin-bottom:5px; font-style:italic; border-left:3px solid #6f42c1;">
        "<span id="guild-motd-display">...</span>"
    </div>
    
    <strong style="font-size:11px; color:#aaa;">Anggota:</strong>
    <div id="guild-member-list" style="max-height: 100px; overflow-y: auto; font-size:11px; border:1px solid #333; padding:5px; background:#121216;"></div>
    
    <button id="btn-leave-guild" style="width:100%; background:#dc3545; margin-top:5px; font-size:10px;">Keluar dari Guild</button>
</div>
