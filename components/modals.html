<div id="buy-modal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div
        style="background:#121216; border:2px solid #ffcc00; border-radius:8px; padding:20px; width:300px; text-align:center; box-shadow: 0 0 15px rgba(255,204,0,0.3);">
        <h3 id="buy-modal-title"
            style="color:#ffcc00; margin-top:0; border-bottom: 1px solid #333; padding-bottom:10px;">Beli Item</h3>
        <div id="buy-modal-icon" style="font-size:40px; margin:15px 0;"></div>
        <div style="margin:15px 0;">
            <label style="font-size:11px; color:#aaa;">Berapa banyak yang ingin Anda beli?</label><br>
            <input type="number" id="buy-modal-qty" value="1" min="1" max="999"
                style="width:80px; text-align:center; font-size:16px; font-weight:bold; background:#222; color:#fff; border:1px solid #555; border-radius:4px; padding:8px; margin-top:8px;">
        </div>
        <div style="font-size:14px; margin-bottom:20px; background:#1a1a1a; padding:10px; border-radius:4px;">
            Total Biaya: <strong id="buy-modal-total" style="color:#28a745; font-size:16px;">0</strong> <span
                id="buy-modal-currency">Gold</span>
        </div>
        <div style="display:flex; justify-content:space-between; gap:10px;">
            <button id="btn-cancel-buy"
                style="flex:1; background:#dc3545; padding:10px; font-weight:bold; border:none; border-radius:4px; color:#fff; cursor:pointer;">BATAL</button>
            <button id="btn-confirm-buy"
                style="flex:1; background:#28a745; padding:10px; font-weight:bold; border:none; border-radius:4px; color:#fff; cursor:pointer;">BELI</button>
        </div>
    </div>
</div>

<div id="rpg-modal"
    style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:10000; justify-content:center; align-items:center;">
    <div id="rpg-modal-box"
        style="background:#121216; border:2px solid #00d2ff; border-radius:8px; padding:20px; width:320px; text-align:center; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);">
        <h3 id="rpg-modal-title"
            style="color:#00d2ff; margin-top:0; border-bottom: 1px dashed #333; padding-bottom:10px;">Notifikasi</h3>
        <p id="rpg-modal-msg" style="color:#ddd; font-size:14px; margin:15px 0; line-height: 1.5;"></p>
        <div style="display:flex; gap:10px; margin-bottom:15px; height: 42px;">
            <input type="text" id="rpg-modal-input"
                style="display:none; flex:1; height:100%; margin:0; padding:10px; background:#0d151e; color:#fff; border:1px solid #00d2ff; border-radius:4px; text-align:center; font-size:16px; font-weight:bold; box-sizing:border-box; outline:none;">

            <button id="btn-rpg-max"
                style="display:none; height:100%; margin:0; padding:0 20px; background:#ffcc00; color:#000; border:none; border-radius:4px; font-weight:bold; cursor:pointer; transition:0.2s; box-sizing:border-box;"
                onmouseover="this.style.background='#e6b800'" onmouseout="this.style.background='#ffcc00'">MAX</button>
        </div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top: 10px;">
            <button id="btn-rpg-cancel"
                style="display:none; flex:1; background:#dc3545; padding:10px; font-weight:bold; border:none; border-radius:4px; color:#fff; cursor:pointer;">BATAL</button>
            <button id="btn-rpg-ok"
                style="flex:1; background:#00d2ff; color:#000; padding:10px; font-weight:bold; border:none; border-radius:4px; cursor:pointer;">OK</button>
        </div>
    </div>
</div>
