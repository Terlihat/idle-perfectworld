<div style="background: #121216; padding: 15px; border-radius: 5px; border: 1px solid #3f3f52;">
    <h3 style="color: #ffca28; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">🎫 Pusat Bantuan (Tiket)</h3>

    <div style="background: #1a1a24; padding: 12px; border-radius: 4px; border: 1px solid #333; margin-bottom: 15px;">
        <h4 style="color: #00d2ff; margin-top: 0; margin-bottom: 10px;">Kirim Laporan ke Admin</h4>
        <select id="ticket-category" style="width: 100%; padding: 8px; margin-bottom: 10px; background: #010409; color: white; border: 1px solid #3f3f52; border-radius: 3px;">
            <option value="UMUM">Pertanyaan Umum</option>
            <option value="BUG">Laporan Bug / Item Hilang</option>
            <option value="REPORT">Laporkan Pemain Toxic/Cheat</option>
        </select>
        <textarea id="ticket-message" rows="3" placeholder="Jelaskan masalah Anda secara detail di sini..." style="width: 100%; padding: 8px; margin-bottom: 10px; background: #010409; color: white; border: 1px solid #3f3f52; resize: vertical; border-radius: 3px; font-family: inherit;"></textarea>
        <button onclick="window.submitSupportTicket()" style="background: #238636; color: white; border: none; padding: 10px; width: 100%; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s;">✉️ Kirim Tiket</button>
    </div>

    <h4 style="color: #ffca28; margin-bottom: 8px; margin-top: 0;">Riwayat Tiket Anda</h4>
    <div id="my-ticket-list" style="max-height: 250px; overflow-y: auto; padding-right: 5px;">
        <div style="text-align: center; color: #aaa; padding: 10px; font-size: 12px;">Memuat riwayat tiket...</div>
    </div>
</div>
